<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#F6F1E8">

  <title>SIFU Study Planner | Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>

<body class="auth-phone-body">
  <main class="auth-phone">
    <section class="auth-phone-content login-content">

      <div class="auth-logo-wrap">
        <img src="assets/logo.jpeg" alt="SIFU Study Planner Logo" class="auth-logo">
      </div>

      <div class="auth-heading">
        <h1>Welcome Back</h1>
        <p>Log in to continue your academic journey</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="loginEmail">UTM Email</label>

          <div class="auth-input-wrap">
            <i class="bi bi-envelope auth-input-icon"></i>
            <input id="loginEmail" type="email" autocomplete="email" placeholder="student@graduate.utm.my" required>
          </div>

          <small class="auth-error">Use a valid UTM email ending with utm.my.</small>
        </div>

        <div class="auth-field">
          <label for="loginPassword">Password</label>

          <div class="auth-input-wrap">
            <i class="bi bi-lock auth-input-icon"></i>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Enter your password" required>

            <button id="toggleLoginPassword" class="auth-eye-btn" type="button" aria-label="Show password">
              <i class="bi bi-eye"></i>
            </button>
          </div>

          <small class="auth-error">Password is required.</small>
        </div>

        <div class="forgot-row">
          <a href="#" data-info="Password reset is part of the User Management module.">Forgot Password?</a>
        </div>

        <button class="auth-main-btn" type="submit">Log In</button>
      </form>

      <p class="auth-bottom-text">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
      </p>

    </section>
  </main>

  <div id="sifuToast" class="simple-toast">
    <span id="toastMessage">Ready.</span>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
