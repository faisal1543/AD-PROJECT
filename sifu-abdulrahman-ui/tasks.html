<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#F6F1E8">

  <title>SIFU Study Planner | My Tasks</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>

<body class="tracking-body">
  <main class="tracking-phone">
    <section class="tracking-content task-content">

      <!-- Back to Profile -->
      <a class="back-profile-link" href="profile.html">
        <i class="bi bi-arrow-left"></i>
        Back to Profile
      </a>

      <!-- Header -->
      <header class="tracking-header">
        <div>
          <h1>My Tasks</h1>
          <p id="taskSummary">3 pending • 1 overdue • 2 done</p>
        </div>

        <button class="tracking-add-btn" id="openTaskModal" type="button">
          <i class="bi bi-plus-lg"></i>
          Add Task
        </button>
      </header>

      <!-- Filters -->
      <div class="task-filter-row">
        <button class="task-filter active" data-filter="All" type="button">All</button>
        <button class="task-filter" data-filter="Pending" type="button">Pending</button>
        <button class="task-filter" data-filter="Completed" type="button">Done</button>
        <button class="task-filter" data-filter="Overdue" type="button">Overdue</button>
      </div>

      <!-- Task Cards -->
      <section id="taskCards" class="tracking-list"></section>

    </section>

    <!-- Bottom Navigation -->
   <nav class="profile-bottom-nav" aria-label="Main navigation">
  <a class="profile-nav-item" href="calendar.html">
    <i class="bi bi-house-door"></i>
    <span>Home</span>
  </a>

  <a class="profile-nav-item" href="schedule.html">
    <i class="bi bi-calendar3"></i>
    <span>Schedule</span>
  </a>

  <a class="profile-nav-ai" href="#" data-info="AI Hub will connect after the AI pages are merged.">
    <i class="bi bi-stars"></i>
    <span>AI Hub</span>
  </a>

  <a class="profile-nav-item" href="#" data-info="Alerts will connect after notifications are merged.">
    <span class="alert-dot"></span>
    <i class="bi bi-bell"></i>
    <span>Alerts</span>
  </a>

  <a class="profile-nav-item" href="profile.html">
    <i class="bi bi-person"></i>
    <span>Profile</span>
  </a>
</nav>
  </main>

  <!-- Task Modal -->
  <div class="entry-modal" id="taskModal" aria-hidden="true">
    <div class="entry-modal-card">
      <div class="entry-modal-header">
        <h2 id="taskModalTitle">Add Task</h2>

        <button class="entry-close" id="closeTaskModal" type="button">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <form id="taskForm">
        <input type="hidden" id="taskId">

        <label class="entry-label" for="taskTitle">Task Title</label>
        <input class="entry-input" id="taskTitle" type="text" required>

        <label class="entry-label" for="taskCourse">Course Code</label>
        <input class="entry-input" id="taskCourse" type="text" required>

        <div class="entry-two-col">
          <div>
            <label class="entry-label" for="taskStatus">Status</label>
            <select class="entry-input" id="taskStatus" required>
              <option>Pending</option>
              <option>Overdue</option>
              <option>Completed</option>
            </select>
          </div>

          <div>
            <label class="entry-label" for="taskPriority">Priority</label>
            <select class="entry-input" id="taskPriority" required>
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
          </div>
        </div>

        <label class="entry-label" for="taskDue">Due Date</label>
        <input class="entry-input" id="taskDue" type="date" required>

        <button class="entry-save-btn" type="submit">Save Task</button>
      </form>
    </div>
  </div>

  <div id="sifuToast" class="simple-toast">
    <span id="toastMessage">Ready.</span>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
